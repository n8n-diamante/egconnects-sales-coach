const SYSTEM_PROMPT=(lang)=>`You are the EG Connects AI Sales Coach — a sharp, friendly, experienced sales trainer for EG Connects, a technology and telecom partner.

${lang==="es"?"IMPORTANT: Respond entirely in fluent business Spanish. Every word must be in Spanish.":"Respond in English."}

EG Connects sells:
- Bitrix24 CRM & Revenue Systems (sales automation, pipeline management)
- Zoom Business (video meetings, Zoom Phone, team chat, AI summaries)
- Aircall (cloud phone for sales/support teams, CRM integration, power dialer)

INDUSTRY SCRIPTS (Real Estate, Healthcare, Legal, Retail/E-commerce, Construction/Trades, Finance/Insurance, Restaurants/Hospitality) — each with cold call hook, pain points, discovery line, pitch.

CLOSING: 5-step close + hard close. Entry points: CRM Health Check (20 min), Carrier Review (15 min), Communications Audit (15 min).

OBJECTIONS with response + key move: Not interested, Already have CRM, Already have carrier, No budget, Too busy, Send me info, Bad past experience, Need to talk to partner, Competitor cheaper, Setup is fine, Give me a price, Locked in contract.

PRODUCTS: Bitrix24 vs spreadsheets, Zoom vs legacy phone, Aircall vs personal phones, T-Mobile (5G/mobile teams), Verizon (rural/SLA), AT&T (metro/FirstNet), Spectrum (no-contract), Comcast (fiber/multi-location), Lumen (enterprise).

ROLE-PLAY: Act as skeptical prospect, push back realistically, give feedback after.

Rules: Be concise, practical, conversational. ${lang==="es"?"Always respond in Spanish.":"Always respond in English."}`;

const QUICK_REF=(l)=>l==="en"?[
  {title:"🚀 Universal Opener",content:`"Hi, is this [First Name]? This is [Your Name] with EG Connects — I'll be quick. We work with businesses in two areas: fixing sales pipelines so leads stop falling through, and auditing telecom so companies aren't overpaying. Which of those is more of a headache right now?"`},
  {title:"🔀 Track A — CRM / Pipeline",content:`"How are you currently tracking leads and follow-ups? If a new lead comes in today, what happens to it?"\n\n→ Pitch: Bitrix24 Revenue System — automated follow-ups, real-time pipeline, zero manual entry.\n→ CTA: Free CRM Health Check (20 min)`},

  {title:"📱 Voicemail",content:`"Hey [First Name], this is [Your Name] with EG Connects. I work with businesses on sales automation and making sure you're not overpaying on telecom. Free 15-minute review, no strings. Call me at [Phone] or I'll try you again [Day]. Talk soon."`},
  {title:"⭐ Golden Rules",content:`1. Always end with a question\n2. Acknowledge before you redirect\n3. Smaller ask = easier yes\n4. Silence after closing = your friend\n5. Pain drives decisions — keep coming back to it`},
  {title:"✉️ Follow-Up Email",content:`Subject: Quick follow-up — [First Name]\n\nHi [First Name],\nI reached out about a free [Health Check / Carrier Review] for [Company]. Takes 15–20 min, costs nothing. I have [Day] and [Day] open — just reply and I'll send a calendar invite.\n\n[Your Name] | EG Connects`},
]:[
  {title:"🚀 Apertura Universal",content:`"Hola, ¿es [Nombre]? Le habla [Tu Nombre] de EG Connects — seré breve. Trabajamos con empresas en dos áreas: optimizar pipelines de ventas y auditar telecom. ¿Cuál es más un dolor de cabeza ahora mismo?"`},
  {title:"🔀 Pista A — CRM / Pipeline",content:`"¿Cómo rastrean sus prospectos? Si llega un prospecto hoy, ¿qué pasa con él?"\n\n→ Pitch: Sistema Bitrix24 — seguimientos automáticos, pipeline en tiempo real.\n→ CTA: Revisión gratuita de CRM (20 min)`},
  {title:"📡 Pista B — Telecom",content:`"¿Cuándo revisaron su telecom por última vez — móvil, internet y teléfono juntos?"\n\n→ Pitch: Representamos T-Mobile, Verizon, AT&T, Spectrum, Comcast, Lumen.\n→ CTA: Revisión gratuita de operador (15 min)`},
  {title:"📞 Pista C — Comunicaciones",content:`"¿Cómo maneja su equipo las llamadas y reuniones?\n\n→ Pitch: Zoom + Aircall — video, teléfono, chat, llamadas en CRM.\n→ CTA: Auditoría gratuita (15 min)`},
  {title:"🤝 Cierre de 5 Pasos",content:`1. Confirmar el dolor: "¿Es eso un resumen justo?"\n2. Presentar solución + auditoría gratuita\n3. Dar DOS opciones de horario\n4. Confirmar con invitación de calendario\n5. Cierre fuerte: "¿Está dispuesto a 15 minutos?"`},
  {title:"📱 Buzón de Voz",content:`"Hola [Nombre], le habla [Tu Nombre] de EG Connects. Trabajo con empresas en automatización de ventas y telecom. Revisión gratuita de 15 minutos. Llámeme al [Teléfono] o lo intento el [Día]. ¡Hasta pronto!"`},
  {title:"⭐ Reglas de Oro",content:`1. Siempre terminar con una pregunta\n2. Reconocer antes de redirigir\n3. Pedido más pequeño = sí más fácil\n4. El silencio es tu aliado\n5. El dolor impulsa decisiones`},
  {title:"✉️ Email de Seguimiento",content:`Asunto: Seguimiento rápido — [Nombre]\n\nHola [Nombre],\nMe comuniqué sobre una revisión gratuita para [Empresa]. Toma 15–20 min, sin costo. Tengo [Día] y [Día] disponibles.\n\n[Tu Nombre] | EG Connects`},
];

const OBJECTIONS=(l)=>l==="en"?[
  {obj:"Not interested",res:"Totally fair. All I'm asking is 15 minutes. If it's not relevant, I'll get out of your way. What's your schedule like [Day]?",key:"Reframe as small, low-risk ask"},
  {obj:"Already have a CRM",res:"Good — that makes it easier. I just want to show you what a fully automated setup looks like vs. what you have. Worth 20 minutes to compare?",key:"Position as comparison, not replacement"},
  {obj:"Already have a carrier",res:"Perfect — you have a baseline. I'll run it through our network. If what you have wins, I'll tell you that. Free review — what do you have to lose?",key:"Make it feel win-win"},
  {obj:"No budget",res:"That's exactly why I'm calling. We find budget by optimizing what you're already spending. The audit is free — let's find out what's there.",key:"Reframe: we find budget, don't add to it"},

  {obj:"Send me some info",res:"I can — but info without knowing your setup doesn't mean much. Let me take 15 minutes to look at what you have and send something tailored. [Day] or [Day]?",key:"Avoid email black hole — convert to call"},
  {obj:"Bad past experience",res:"Can I ask what went wrong? [Listen.] Here's the difference with us: [address complaint]. I'd rather earn trust with a free audit. Fair?",key:"Diagnose the past failure. Differentiate."},
  {obj:"Need to talk to partner/manager",res:"Would it be easier if I joined that conversation? I can walk through everything in 20 minutes. What's their schedule like?",key:"Get in the room. Don't get filtered."},
  {obj:"Competitor is cheaper",res:"Good — you should shop around. Here's where we're different: we build the system, integrate it, and stay involved after the sale. What's their support been like?",key:"Compete on value and support, not price"},
  {obj:"Setup is fine",res:"When's the last time you measured it? Do you know your lead response time or what you pay per line? Most say 'fine' until they see the numbers.",key:"Challenge assumption with specifics"},
  {obj:"Just give me a price",res:"I'd be guessing without knowing your team size and setup. The free review gives you a real number. 15 minutes — can we do that first?",key:"Use price question to book the meeting"},
  {obj:"Locked into a contract",res:"When does it expire? Let's run the review now so when it's up, you already know what you want. No pressure today — just smart timing.",key:"Plant the seed early."},
]:[
  {obj:"No me interesa",res:"Totalmente comprensible. Solo le pido 15 minutos. Si no es relevante, no le molesto más. ¿Cómo tiene el horario el [Día]?",key:"Replantear como solicitud pequeña"},
  {obj:"Ya tenemos un CRM",res:"Perfecto — eso facilita la conversación. Solo quiero mostrarle cómo se ve un sistema automatizado vs. lo que tiene. ¿Vale 20 minutos?",key:"Posicionar como comparación, no reemplazo"},
  {obj:"Ya tenemos un operador",res:"Perfecto — ya tiene una base. Lo comparo contra nuestra red. Si lo que tiene gana, se lo digo. La revisión es gratis.",key:"Hacerlo sentir como ganar-ganar"},
  {obj:"No tenemos presupuesto",res:"Por eso le llamo. Encontramos presupuesto optimizando lo que ya gasta. La auditoría es gratis.",key:"Replantear: encontramos presupuesto"},
  {obj:"Estamos muy ocupados",res:"Es lo más común que escucho. Solo necesito 15 minutos una vez. Después el sistema trabaja por usted.",key:"Invertir la lógica"},
  {obj:"Envíeme información",res:"Puedo — pero sin conocer su configuración no dice mucho. Déjeme 15 minutos para enviarle algo personalizado.",key:"Evitar agujero negro del email"},
  {obj:"Tuvimos mala experiencia",res:"¿Puedo preguntar qué salió mal? [Escuchar.] Aquí está la diferencia: [abordar queja]. Prefiero ganar su confianza con una auditoría gratis.",key:"Diagnosticar y diferenciarse"},
  {obj:"Necesito hablar con mi socio",res:"¿Sería más fácil si me uno a esa conversación? Puedo explicar todo en 20 minutos.",key:"Estar presente en la reunión"},
  {obj:"La competencia es más barata",res:"Bien — debería comparar. Aquí está la diferencia: construimos el sistema y seguimos involucrados. ¿Cómo ha sido el soporte de ellos?",key:"Competir en valor, no en precio"},
  {obj:"Nuestra configuración está bien",res:"¿Cuándo fue la última vez que lo midió? La mayoría dice 'bien' hasta que ve los números.",key:"Desafiar el supuesto"},
  {obj:"Solo dígame el precio",res:"Estaría adivinando sin conocer su equipo. La revisión gratuita le da un número real. 15 minutos primero.",key:"Usar precio para agendar"},
  {obj:"Estamos en contrato",res:"¿Cuándo vence? Hagamos la revisión ahora para que cuando venza, ya sepa lo que quiere.",key:"Plantar la semilla temprano"},
];

const PRODUCTS=[
  {name:"Bitrix24",category:"CRM",bestFor:"Businesses losing deals to manual follow-up",vs:"vs. Spreadsheets / basic CRM",wins:["Full automation","Real-time pipeline","Zero manual entry","Built-in reports"]},
  {name:"Aircall",category:"Phone",bestFor:"Sales/support teams making 20+ calls/day",vs:"vs. Personal cell phones",wins:["Auto-logs to CRM","Call recordings & analytics","Power Dialer","Any area code instantly"]},
  {name:"Zoom",category:"Communications",bestFor:"Teams paying for 3+ separate tools",vs:"vs. Legacy phone + separate video",wins:["Video + Phone + Chat in one","AI meeting summaries","Cloud PBX","Cost consolidation"]},
  {name:"T-Mobile",category:"Carrier",bestFor:"Mobile teams, remote workers, 5G needs",wins:["Flexible plans","No long-term lock-in","Hotspot & tablet plans","Priority support"]},
  {name:"Verizon",category:"Carrier",bestFor:"Suburban/rural areas, heavy data, IoT",wins:["Best rural coverage","IoT support","SLA guarantees","Private networking"]},
  {name:"AT&T",category:"Carrier",bestFor:"Metro areas, first responders, multi-location",wins:["Strong metro coverage","FirstNet access","Mobile + fiber bundles","Enterprise multi-location"]},
  {name:"Spectrum",category:"Internet",bestFor:"Small/mid offices, no-contract internet",wins:["No annual contracts","Reliable coax/fiber","Bundle options","Strong regional coverage"]},
  {name:"Comcast",category:"Internet",bestFor:"Cloud-heavy ops, multi-location",wins:["Symmetrical fiber","SD-WAN support","Nationwide footprint","Bundled voice"]},
  {name:"Lumen",category:"Internet",bestFor:"Enterprise, private networking",wins:["Enterprise-grade","Private network options","Advanced security","Dedicated support"]},
];

const TABS_EN=["💬 AI Coach","📋 Quick Reference","📊 Products","🎯 Call Tracker"];
const TABS_ES=["💬 Coach IA","📋 Referencia","📊 Productos","🎯 Llamadas"];

function loadLog(){try{return JSON.parse(localStorage.getItem("eg_call_log")||"[]")}catch{return[]}}
function saveLog(log){try{localStorage.setItem("eg_call_log",JSON.stringify(log))}catch{}}

function App(){
  const [lang,setLang]=useState(null);
  const [tab,setTab]=useState(0);
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [expandedObj,setExpandedObj]=useState(null);
  const [expandedRef,setExpandedRef]=useState(null);
  const [calls,setCalls]=useState(loadLog());
  const [form,setForm]=useState({name:"",company:"",industry:"",track:"",result:"",notes:""});
  const bottomRef=useRef(null);
  const taRef=useRef(null);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"})},[messages,loading]);

  const pickLang=(l)=>{
    setLang(l);
    setMessages([{role:"assistant",content:l==="en"
      ?"Hey! 👋 I'm your EG Connects AI Sales Coach. I know every script, objection, and industry pitch.\n\nWhat do you need help with?\n• Cold call scripts & openers\n• Industry-specific pitches\n• Objection handling\n• Closing scripts\n• Role-play practice\n\nJust ask or pick a quick option below."
      :"¡Hola! 👋 Soy tu Coach de Ventas IA de EG Connects. Conozco cada guión, objeción y pitch.\n\n¿Con qué necesitas ayuda?\n• Guiones de llamada en frío\n• Pitches por industria\n• Manejo de objeciones\n• Guiones de cierre\n• Práctica de roleplay\n\nSolo pregunta o elige una opción abajo."
    }]);
  };

  const send=async(text)=>{
    const msg=text||input.trim();
    if(!msg||loading)return;
    setInput("");
    if(taRef.current)taRef.current.style.height="auto";
    const newMsgs=[...messages,{role:"user",content:msg}];
    setMessages(newMsgs);
    setLoading(true);
    try{
      // Build conversation history for Gemini
      const history=newMsgs.slice(1,-1).map(m=>({
        role:m.role==="assistant"?"model":"user",
        parts:[{text:m.content}]
      }));
      // Build conversation history for Groq
      const history=newMsgs.slice(1,-1).map(m=>({
        role:m.role==="assistant"?"assistant":"user",
        content:m.content
      }));
      const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":`Bearer ${GROQ_API_KEY}`},
        body:JSON.stringify({
          model:"llama-3.3-70b-versatile",
          max_tokens:1000,
          temperature:0.7,
          messages:[
            {role:"system",content:SYSTEM_PROMPT(lang)},
            ...history,
            {role:"user",content:msg}
          ]
        })
      });
      if(!res.ok){
        const err=await res.json().catch(()=>({}));
        throw new Error(err?.error?.message||`HTTP ${res.status}`);
      }
      const data=await res.json();
      const reply=data?.choices?.[0]?.message?.content
        ||(lang==="en"?"Sorry, couldn't get a response. Try again.":"Lo siento, intenta de nuevo.");
      setMessages([...newMsgs,{role:"assistant",content:reply}]);
    }catch(e){
      setMessages([...newMsgs,{role:"assistant",content:`Error: ${e.message||"Something went wrong"}. Check your API key.`}]);
    }
    setLoading(false);
  };

  const addCall=()=>{
    if(!form.name)return;
    const entry={...form,id:Date.now(),date:new Date().toLocaleDateString()};
    const u=[entry,...calls];setCalls(u);saveLog(u);
    setForm({name:"",company:"",industry:"",track:"",result:"",notes:""});
  };
  const delCall=(id)=>{const u=calls.filter(c=>c.id!==id);setCalls(u);saveLog(u);};
  const rColor=(r)=>({Booked:"#22c55e",Agendado:"#22c55e",Callback:"#f59e0b","Llamar después":"#f59e0b","Not Interested":"#ef4444","No interesado":"#ef4444",Voicemail:"#6b7280",Buzón:"#6b7280","Follow-up":"#3b82f6",Seguimiento:"#3b82f6"}[r]||"#6b7280");
  const cats=[...new Set(PRODUCTS.map(p=>p.category))];
  const isEs=lang==="es";
  const tabs=isEs?TABS_ES:TABS_EN;

  const s={
    flex:{display:"flex"},col:{flexDirection:"column"},
    card:{background:"#1e2333",border:"1px solid #2a2f3e",borderRadius:12,padding:"12px 14px"},
    inp:{background:"#0f1117",border:"1px solid #2a2f3e",borderRadius:8,padding:"7px 10px",color:"#f0f0f0",fontSize:13,outline:"none",fontFamily:"inherit"},
    sel:{background:"#0f1117",border:"1px solid #2a2f3e",borderRadius:8,padding:"7px 10px",fontSize:12,outline:"none"},
    tag:{background:"#0f1117",border:"1px solid #2a2f3e",borderRadius:5,padding:"3px 8px",fontSize:11,color:"#d1d5db"},
  };

  if(!lang) return(
    <div style={{...s.flex,...s.col,alignItems:"center",justifyContent:"center",height:"100vh",background:"#0f1117",gap:32,padding:24}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:64,height:64,borderRadius:"50%",background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",...s.flex,alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:800,margin:"0 auto 14px",color:"#fff"}}>EG</div>
        <div style={{fontSize:22,fontWeight:800,color:"#fff",marginBottom:6}}>EG Connects AI Sales Coach</div>
        <div style={{fontSize:14,color:"#6b7280"}}>Choose your language / Elige tu idioma</div>
      </div>
      <div style={{...s.flex,gap:16,flexWrap:"wrap",justifyContent:"center"}}>
        {[{l:"en",flag:"🇺🇸",name:"English",sub:"Continue in English",border:"#3b82f6"},{l:"es",flag:"🇪🇸",name:"Español",sub:"Continuar en Español",border:"#8b5cf6"}].map(b=>(
          <button key={b.l} onClick={()=>pickLang(b.l)} style={{background:"#1e2333",border:`2px solid ${b.border}`,borderRadius:16,padding:"26px 40px",cursor:"pointer",...s.flex,...s.col,alignItems:"center",gap:10,minWidth:150}}>
            <div style={{fontSize:38}}>{b.flag}</div>
            <div style={{fontWeight:700,fontSize:18,color:"#fff"}}>{b.name}</div>
            <div style={{fontSize:12,color:"#6b7280"}}>{b.sub}</div>
          </button>
        ))}
      </div>
    </div>
  );

  return(
    <div style={{...s.flex,...s.col,height:"100vh",background:"#0f1117",fontSize:14}}>
      {/* Header */}
      <div style={{background:"#161b27",borderBottom:"1px solid #2a2f3e",padding:"10px 14px",...s.flex,alignItems:"center",gap:10}}>
        <div style={{width:34,height:34,borderRadius:"50%",background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",...s.flex,alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:12,flexShrink:0,color:"#fff"}}>EG</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:13,color:"#fff"}}>EG Connects {isEs?"Coach IA":"AI Sales Coach"}</div>
          <div style={{fontSize:10,color:"#6b7280",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>Bitrix24 · Zoom · Aircall · T-Mobile · Verizon · AT&T · Spectrum · Comcast · Lumen</div>
        </div>
        <button onClick={()=>{setLang(null);setMessages([]);setTab(0);}} style={{background:"#1e2333",border:"1px solid #2a2f3e",borderRadius:8,padding:"5px 10px",color:"#a5b4fc",fontSize:12,cursor:"pointer",fontWeight:600}}>
          {isEs?"🇺🇸 EN":"🇪🇸 ES"}
        </button>
      </div>

      {/* Tabs */}
      <div style={{background:"#161b27",borderBottom:"1px solid #2a2f3e",...s.flex,overflowX:"auto"}}>
        {tabs.map((t,i)=>(
          <button key={i} onClick={()=>setTab(i)} style={{padding:"9px 14px",background:"none",border:"none",borderBottom:tab===i?"2px solid #3b82f6":"2px solid transparent",color:tab===i?"#3b82f6":"#6b7280",fontSize:12,fontWeight:tab===i?600:400,cursor:"pointer",whiteSpace:"nowrap"}}>
            {t}
          </button>
        ))}
      </div>

      {/* Tab 0: AI Coach */}
      {tab===0&&(
        <div style={{flex:1,...s.flex,...s.col,overflow:"hidden"}}>
          <div style={{flex:1,overflowY:"auto",padding:14,...s.flex,...s.col,gap:12}}>
            {messages.map((m,i)=>(
              <div key={i} style={{...s.flex,justifyContent:m.role==="user"?"flex-end":"flex-start",gap:8,alignItems:"flex-start"}}>
                {m.role==="assistant"&&<div style={{width:26,height:26,borderRadius:"50%",background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",...s.flex,alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,flexShrink:0,marginTop:2,color:"#fff"}}>EG</div>}
                <div style={{maxWidth:"78%",background:m.role==="user"?"linear-gradient(135deg,#3b82f6,#6366f1)":"#1e2333",border:m.role==="assistant"?"1px solid #2a2f3e":"none",borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"10px 13px",lineHeight:1.65,whiteSpace:"pre-wrap",color:"#f0f0f0"}}>
                  {m.content}
                </div>
              </div>
            ))}
            {loading&&(
              <div style={{...s.flex,gap:8}}>
                <div style={{width:26,height:26,borderRadius:"50%",background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",...s.flex,alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,flexShrink:0,color:"#fff"}}>EG</div>
                <div style={{background:"#1e2333",border:"1px solid #2a2f3e",borderRadius:"16px 16px 16px 4px",padding:"10px 14px",...s.flex,gap:4}}>
                  {[0,1,2].map(j=><div key={j} style={{width:6,height:6,borderRadius:"50%",background:"#6b7280",animation:"bounce 1.2s infinite",animationDelay:`${j*.2}s`}}/>)}
                </div>
              </div>
            )}
            <div ref={bottomRef}/>
          </div>
          {messages.length<=2&&(
            <div style={{padding:"0 14px 10px",...s.flex,flexWrap:"wrap",gap:6}}>
              {SUGGESTIONS(lang).map((sg,i)=>(
                <button key={i} onClick={()=>send(sg)} style={{background:"#1e2333",border:"1px solid #2a2f3e",borderRadius:14,padding:"5px 11px",fontSize:12,color:"#a5b4fc",cursor:"pointer"}}>{sg}</button>
              ))}
            </div>
          )}
          <div style={{background:"#161b27",borderTop:"1px solid #2a2f3e",padding:"11px 14px",...s.flex,gap:8,alignItems:"flex-end"}}>
            <textarea ref={taRef} value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
              onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,100)+"px";}}
              placeholder={isEs?"Pregunta por un guión, objeción, roleplay...":"Ask for a script, objection help, role-play..."} rows={1}
              style={{flex:1,background:"#1e2333",border:"1px solid #2a2f3e",borderRadius:10,padding:"9px 12px",color:"#f0f0f0",fontSize:14,resize:"none",outline:"none",fontFamily:"inherit",lineHeight:1.5,maxHeight:100}}/>
            <button onClick={()=>send()} disabled={loading||!input.trim()} style={{width:38,height:38,borderRadius:10,border:"none",cursor:loading||!input.trim()?"not-allowed":"pointer",background:loading||!input.trim()?"#2a2f3e":"linear-gradient(135deg,#3b82f6,#6366f1)",...s.flex,alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      )}

      {/* Tab 1: Quick Reference */}
      {tab===1&&(
        <div style={{flex:1,overflowY:"auto",padding:14,...s.flex,...s.col,gap:8}}>
          <div style={{fontWeight:700,fontSize:15,color:"#fff",marginBottom:2}}>{isEs?"📋 Referencia Rápida":"📋 Quick Reference Card"}</div>
          <div style={{fontSize:12,color:"#6b7280",marginBottom:6}}>{isEs?"Toca para expandir.":"Tap any card to expand."}</div>
          {QUICK_REF(lang).map((r,i)=>(
            <div key={i} onClick={()=>setExpandedRef(expandedRef===i?null:i)} style={{...s.card,cursor:"pointer",border:`1px solid ${expandedRef===i?"#3b82f6":"#2a2f3e"}`}}>
              <div style={{...s.flex,justifyContent:"space-between"}}>
                <div style={{fontWeight:600,color:expandedRef===i?"#93c5fd":"#e0e0e0"}}>{r.title}</div>
                <div style={{color:"#6b7280"}}>{expandedRef===i?"▲":"▼"}</div>
              </div>
              {expandedRef===i&&<div style={{marginTop:10,color:"#d1d5db",lineHeight:1.75,whiteSpace:"pre-wrap",fontSize:13,borderTop:"1px solid #2a2f3e",paddingTop:10}}>{r.content}</div>}
            </div>
          ))}
          <div style={{marginTop:8,fontWeight:700,fontSize:14,color:"#fff",marginBottom:8}}>{isEs?"🛡️ Objeciones":"🛡️ Objection Quick-Fire"}</div>
          {OBJECTIONS(lang).map((o,i)=>(
            <div key={i} onClick={()=>setExpandedObj(expandedObj===i?null:i)} style={{...s.card,cursor:"pointer",border:`1px solid ${expandedObj===i?"#f59e0b":"#2a2f3e"}`,marginBottom:7}}>
              <div style={{...s.flex,justifyContent:"space-between"}}>
                <div style={{fontWeight:600,color:expandedObj===i?"#fcd34d":"#e0e0e0"}}>"{o.obj}"</div>
                <div style={{color:"#6b7280"}}>{expandedObj===i?"▲":"▼"}</div>
              </div>
              {expandedObj===i&&(
                <div style={{marginTop:9,borderTop:"1px solid #2a2f3e",paddingTop:9}}>
                  <div style={{color:"#d1d5db",lineHeight:1.7,fontSize:13,marginBottom:7}}>"{o.res}"</div>
                  <div style={{background:"#2a2f3e",borderRadius:6,padding:"5px 9px",fontSize:12,color:"#f59e0b"}}>⚡ {isEs?"Movimiento Clave":"Key Move"}: {o.key}</div>
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {/* Tab 2: Products */}
      {tab===2&&(
        <div style={{flex:1,overflowY:"auto",padding:14}}>
          <div style={{fontWeight:700,fontSize:15,color:"#fff",marginBottom:4}}>📊 {isEs?"Comparación de Productos":"Product Comparison"}</div>
          <div style={{fontSize:12,color:"#6b7280",marginBottom:14}}>{isEs?"Sabe exactamente qué vender y cuándo.":"Know exactly what to pitch and when."}</div>
          {cats.map(cat=>(
            <div key={cat} style={{marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:700,color:"#6366f1",textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>{cat}</div>
              {PRODUCTS.filter(p=>p.category===cat).map((p,i)=>(
                <div key={i} style={{...s.card,marginBottom:8}}>
                  <div style={{...s.flex,justifyContent:"space-between",marginBottom:5}}>
                    <div style={{fontWeight:700,fontSize:14,color:"#fff"}}>{p.name}</div>
                    <div style={{background:"#2a2f3e",borderRadius:6,padding:"2px 7px",fontSize:11,color:"#a5b4fc"}}>{p.category}</div>
                  </div>
                  <div style={{fontSize:12,color:"#22c55e",marginBottom:5}}>✓ {isEs?"Ideal para":"Best for"}: {p.bestFor}</div>
                  {p.vs&&<div style={{fontSize:12,color:"#f59e0b",marginBottom:5}}>⚡ {p.vs}</div>}
                  <div style={{...s.flex,flexWrap:"wrap",gap:5}}>
                    {p.wins.map((w,j)=><div key={j} style={s.tag}>{w}</div>)}
                  </div>
                </div>
              ))}
            </div>
          ))}
        </div>
      )}

      {/* Tab 3: Call Tracker */}
      {tab===3&&(
        <div style={{flex:1,overflowY:"auto",padding:14}}>
          <div style={{fontWeight:700,fontSize:15,color:"#fff",marginBottom:4}}>🎯 {isEs?"Registro de Llamadas":"Call Tracker"}</div>
          <div style={{fontSize:12,color:"#6b7280",marginBottom:12}}>{isEs?"Registra tus llamadas y rastrea resultados.":"Log your calls and track results."}</div>
          {calls.length>0&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7,marginBottom:12}}>
              {[{label:isEs?"Total":"Total",val:calls.length,color:"#3b82f6"},{label:isEs?"Agendados":"Booked",val:calls.filter(c=>["Booked","Agendado"].includes(c.result)).length,color:"#22c55e"},{label:isEs?"Seguimientos":"Follow-ups",val:calls.filter(c=>["Callback","Follow-up","Llamar después","Seguimiento"].includes(c.result)).length,color:"#f59e0b"}].map((st,i)=>(
                <div key={i} style={{...s.card,textAlign:"center",padding:9}}>
                  <div style={{fontSize:20,fontWeight:800,color:st.color}}>{st.val}</div>
                  <div style={{fontSize:11,color:"#6b7280"}}>{st.label}</div>
                </div>
              ))}
            </div>
          )}
          <div style={{...s.card,marginBottom:12}}>
            <div style={{fontWeight:600,marginBottom:9,color:"#93c5fd"}}>+ {isEs?"Registrar Llamada":"Log a Call"}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:7}}>
              <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder={isEs?"Nombre *":"Contact Name *"} style={s.inp}/>
              <input value={form.company} onChange={e=>setForm({...form,company:e.target.value})} placeholder={isEs?"Empresa":"Company"} style={s.inp}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:7}}>
              <select value={form.industry} onChange={e=>setForm({...form,industry:e.target.value})} style={{...s.sel,color:form.industry?"#f0f0f0":"#6b7280"}}>
                <option value="">{isEs?"Industria":"Industry"}</option>
                {(isEs?["Bienes Raíces","Salud","Legal","Retail","Construcción","Finanzas","Restaurantes","Otro"]:["Real Estate","Healthcare","Legal","Retail","Construction","Finance","Restaurants","Other"]).map(o=><option key={o}>{o}</option>)}
              </select>
              <select value={form.track} onChange={e=>setForm({...form,track:e.target.value})} style={{...s.sel,color:form.track?"#f0f0f0":"#6b7280"}}>
                <option value="">{isEs?"Pista":"Track"}</option>
                {(isEs?["CRM/Pipeline","Telecom","Comunicaciones","Todos"]:["CRM/Pipeline","Telecom","Communications","All"]).map(o=><option key={o}>{o}</option>)}
              </select>
              <select value={form.result} onChange={e=>setForm({...form,result:e.target.value})} style={{...s.sel,color:form.result?"#f0f0f0":"#6b7280"}}>
                <option value="">{isEs?"Resultado":"Result"}</option>
                {(isEs?["Agendado","Llamar después","No interesado","Buzón","Seguimiento"]:["Booked","Callback","Not Interested","Voicemail","Follow-up"]).map(o=><option key={o}>{o}</option>)}
              </select>
            </div>
            <input value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder={isEs?"Notas (opcional)":"Notes (optional)"} style={{...s.inp,width:"100%",marginBottom:9}}/>
            <button onClick={addCall} disabled={!form.name} style={{width:"100%",padding:9,background:form.name?"linear-gradient(135deg,#3b82f6,#6366f1)":"#2a2f3e",border:"none",borderRadius:8,color:"#fff",fontSize:13,fontWeight:600,cursor:form.name?"pointer":"not-allowed"}}>
              {isEs?"Registrar Llamada":"Log Call"}
            </button>
          </div>
          {calls.length===0?(
            <div style={{textAlign:"center",color:"#6b7280",padding:24}}>{isEs?"Sin llamadas registradas aún.":"No calls logged yet."}</div>
          ):(
            <div style={{...s.flex,...s.col,gap:7}}>
              {calls.map(c=>(
                <div key={c.id} style={s.card}>
                  <div style={{...s.flex,justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <div style={{fontWeight:600,color:"#fff"}}>{c.name}{c.company&&<span style={{color:"#6b7280",fontWeight:400}}> · {c.company}</span>}</div>
                      <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>{c.date}{c.industry&&` · ${c.industry}`}{c.track&&` · ${c.track}`}</div>
                      {c.notes&&<div style={{fontSize:12,color:"#9ca3af",marginTop:3}}>{c.notes}</div>}
                    </div>
                    <div style={{...s.flex,alignItems:"center",gap:7}}>
                      {c.result&&<div style={{background:rColor(c.result)+"22",border:`1px solid ${rColor(c.result)}44`,borderRadius:6,padding:"2px 8px",fontSize:11,color:rColor(c.result),fontWeight:600}}>{c.result}</div>}
                      <button onClick={()=>delCall(c.id)} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:18}}>×</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
